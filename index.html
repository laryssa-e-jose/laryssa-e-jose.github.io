<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >


  <title>Laryssa & José</title>


<link rel="preload" as="image" href="Fundo.png">
<link rel="preload" as="image" href="envelope-base.png">
<link rel="preload" as="image" href="aba-envelope.png">
<link rel="preload" as="image" href="selo.png">
<link rel="preload" as="image" href="carta-nova.png">


  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main>

    <div class="area-convite">

      <!-- Carta criada no Canva -->
      <img
        src="carta-nova.png"
        alt="Carta do convite de Laryssa e José"
        class="carta"
        id="carta"
      >

      <!-- Envelope dividido em camadas -->
      <div
        class="envelope-conjunto"
        id="envelope-conjunto"
      >

        <img
          src="envelope-base.png"
          alt="Base do envelope"
          class="envelope-base"
        >

        <img
          src="aba-envelope.png"
          alt="Aba do envelope"
          class="aba-envelope"
          id="aba-envelope"
        >

        <img
          src="selo.png"
          alt="Selo do envelope"
          class="selo"
          id="selo"
        >

        <button
          class="selo-botao"
          id="selo-botao"
          type="button"
          aria-label="Abrir o convite tocando no selo"
        ></button>

      </div>

    </div>

    <!-- Orientação inicial -->
    <p
      class="texto"
      id="texto"
    >
      Toque no selo para abrir
    </p>

    <!-- Botão que aparece depois da carta -->
    <a
      href="https://noivos.casar.com/jose-e-laryssa-31-10-26"
      class="botao-site"
      id="botao-site"
      hidden
    >
      Entrar no nosso site
    </a>

  </main>

  <script src="script.js"></script>

</body>

</html>
